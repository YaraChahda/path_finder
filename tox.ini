[tox]
env_list = py3{10,11,12}, coverage, docs
min_version = 4.0

[gh-actions]
python =
    3.10: py310, docs
    3.11: py311
    3.12: py312

[testenv]
basepython =
    {py310,docs,coverage,lint}: python3.10
    py311: python3.11
    py312: python3.12
setenv =
    PYTHONUNBUFFERED = yes
passenv =
    PATH_FINDER_DATA
deps =
    pytest>=8.0
    pytest-cov>=5.0
    Pillow>=10.0
usedevelop = true
commands =
    pytest Tests/ {posargs:-v}

[testenv:coverage]
deps =
    {[testenv]deps}
    genbadge[coverage]
commands =
    pytest Tests/ \
        --cov=src/path_finder \
        --cov-report=xml:.tox/coverage.xml \
        --cov-report=term-missing \
        --cov-fail-under=60
    genbadge coverage -i .tox/coverage.xml -o assets/coverage-badge.svg


[testenv:lint]
deps =
    mypy>=1.10
    types-Pillow
commands =
    mypy src/path_finder \
        --ignore-missing-imports \
        --exclude "app\.py"


[testenv:docs]
description = build HTML docs
setenv =
    READTHEDOCS_PROJECT = path_finder
    READTHEDOCS_VERSION = latest
extras =
    doc
commands =
    sphinx-build -d "{toxworkdir}/docs_doctree" docs/source docs/docs_out -W
