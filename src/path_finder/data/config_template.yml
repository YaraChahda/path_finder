# AiZynthFinder configuration template
# Generated by path-finder-setup
# Replace /PATH/TO/AIZYNTHFINDER/ with the absolute path to your model files.
#
# Files to download from:
# https://github.com/MolecularAI/aizynthfinder/releases
#
# Files needed:
#   - uspto_model.onnx
#   - uspto_templates.csv.gz
#   - uspto_ringbreaker_model.onnx
#   - uspto_ringbreaker_templates.csv.gz
#   - uspto_filter_model.onnx
#   - zinc_stock.hdf5

expansion:
  uspto:
    - /PATH/TO/AIZYNTHFINDER/uspto_model.onnx
    - /PATH/TO/AIZYNTHFINDER/uspto_templates.csv.gz
  ringbreaker:
    - /PATH/TO/AIZYNTHFINDER/uspto_ringbreaker_model.onnx
    - /PATH/TO/AIZYNTHFINDER/uspto_ringbreaker_templates.csv.gz

filter:
  uspto:
    - /PATH/TO/AIZYNTHFINDER/uspto_filter_model.onnx

stock:
  zinc:
    - /PATH/TO/AIZYNTHFINDER/zinc_stock.hdf5

search:
  algorithm: mcts
  max_transforms: 6
  iteration_limit: 100
  return_first: false
